<div class="sn-picker">
  <div class="sn-search compact">
    <input type="search" [(ngModel)]="query" [placeholder]="ui.SEARCH_UNSPLASH" (keyup.enter)="search()" />
    <button class="sn-btn sm" (click)="search()">{{ ui.SEARCH_UNSPLASH_BTN }}</button>
  </div>

  @if (loading) {
    <div style="text-align:center; padding:20px 0; color:var(--sn-muted); font-size:13px;">{{ ui.LOADING }}</div>
  }

  @if (!loading && searched && photos.length === 0) {
    <div style="text-align:center; padding:40px 0; color:var(--sn-muted); font-style:italic;">{{ ui.SEARCH_RESULTS_FOR }} « {{ query }} »</div>
  }

  @if (!loading && photos.length > 0) {
    <div class="sn-picker__grid">
      @for (photo of photos; track photo.id) {
        <button class="sn-picker__tile" [class.is-selected]="selectedUrl === photo.urls.regular" (click)="selectPhoto(photo.urls.regular)">
          <img [src]="photo.urls.thumb" [alt]="photo.alt_description || ui.UNSPlASH_PHOTO" loading="lazy" />
          @if (selectedUrl === photo.urls.regular) {
            <div class="sn-picker__check">✓</div>
          }
        </button>
      }
    </div>
  }
</div>
